<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sheets — plastron</title>
    <style>
      :root { color-scheme: light dark; }
      body { font: 14px/1.45 system-ui, sans-serif; margin: 0; padding: 1rem; }

      /* Sheets app */
      .sheet-app { max-width: 64rem; margin: 0 auto; }
      .bar { display: flex; gap: .5rem; align-items: center; margin: .75rem 0; }
      .bar .cellref { font: 13px/1 ui-monospace, monospace; min-width: 3rem;
                      padding: .35rem .5rem; background: #8881; border-radius: .25rem; }
      .bar .fx { flex: 1; font: 13px/1.3 ui-monospace, monospace;
                 padding: .35rem .5rem; border: 1px solid #8884; border-radius: .25rem; }
      .bar button { font: inherit; padding: .35rem .75rem; cursor: pointer;
                    border: 0; border-radius: .25rem; background: #007aff; color: #fff; }
      .bar button.close { background: transparent; color: #888; font-size: 1.2rem; }
      .bar button:hover { filter: brightness(1.08); }

      .grid table { border-collapse: collapse; font: 13px/1 ui-monospace, monospace; }
      .grid th, .grid td { border: 1px solid #8884; padding: .35rem .5rem;
                           min-width: 5rem; height: 1.5rem; }
      .grid th { background: #8881; font-weight: 600; color: #888; }
      .grid th.corner, .grid th.rownum { width: 2rem; min-width: 2rem; text-align: center; }
      .grid td.cell { cursor: pointer; background: transparent; }
      .grid td.cell:hover { background: #8881; }
      .grid td.cell.selected { background: rgba(0,122,255,.18);
                               outline: 2px solid #007aff; outline-offset: -2px; }

      /* File toolbar (rendered above bar) */
      .file-toolbar { display: flex; gap: .35rem; padding: .5rem 0; }
      .file-toolbar button { font: inherit; padding: .25rem .6rem; cursor: pointer;
                             background: #8882; border: 1px solid #8884; border-radius: .2rem; }
      .file-toolbar select { font: inherit; padding: .25rem .35rem; }

      .meta-panel { margin-top: 1rem; }
      .meta-panel h4 { margin: 0 0 .25rem; color: #888; font-size: .75rem; }
      .meta { font: 11px/1.4 ui-monospace, monospace;
              background: #8881; padding: .5rem; border-radius: .25rem;
              max-height: 14rem; overflow: auto; margin: 0; white-space: pre-wrap; }

      .note { color: #888; font-size: .9rem; border-left: 2px solid #8884;
              padding-left: .75rem; margin: 1rem auto; max-width: 64rem; }
      code { font: 12px/1.4 ui-monospace, monospace; background: #8881; padding: .1rem .3rem; border-radius: .2rem; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <p class="note">Standalone sheets — same <code>buildSheetsApp</code> /
       <code>setupFileToolbar</code> the plastron-OS desktop uses, mounted
       on its own page. Click a cell, type a formula like <code>=A1*2</code>,
       press Enter. Saves go to OPFS (browser) or <code>./.plastron-fs</code>
       (factory tooling).</p>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
